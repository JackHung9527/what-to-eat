<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Helvetica Neue", sans-serif;
    background: linear-gradient(160deg, #fff5eb 0%, #ffe8d6 100%);
    color: #2d2d2d;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 100px) 16px;
    max-width: 500px;
    margin: 0 auto;
  }
  header { padding: 8px 0 4px; text-align: center; }
  h1 { font-size: 20px; font-weight: 800; color: #ff6b35; letter-spacing: 2px; }

.bottom-nav {
position: fixed; bottom: 0; left: 0; right: 0;
display: flex;
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
border-top: 1px solid #eee;
padding: 8px env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 8px) env(safe-area-inset-left);
z-index: 10;
}
.nav-btn {
flex: 1; padding: 8px; border: none; background: transparent;
font-size: 13px; color: #999; cursor: pointer;
}
.nav-btn.active { color: #ff6b35; font-weight: 700; }
.nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }

.page { display: none; }
.page.active { display: flex; flex-direction: column; flex: 1; }

.filter-section {
background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px;
box-shadow: 0 4px 16px rgba(255,107,53,0.08);
}
.filter-label {
font-size: 13px; color: #999; margin-bottom: 8px; font-weight: 600;
}
.chip-group {
display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.chip-group:last-child { margin-bottom: 0; }
.chip {
padding: 7px 14px; border: 1.5px solid #eee; background: white;
border-radius: 20px; font-size: 13px; color: #666; cursor: pointer;
transition: all 0.15s; font-family: inherit;
}
.chip.active { background: #ff6b35; border-color: #ff6b35; color: white; }

.result-card {
background: white; border-radius: 20px; padding: 24px 20px; margin-bottom: 12px;
box-shadow: 0 8px 30px rgba(255,107,53,0.12); min-height: 180px;
display: flex; flex-direction: column; justify-content: center;
}
.result-empty { text-align: center; color: #bbb; font-size: 15px; white-space: pre-line; }
.result-name {
font-size: 28px; font-weight: 800; color: #ff6b35;
margin-bottom: 10px; text-align: center;
}
.result-name.rolling { animation: shake 0.08s infinite; }
@keyframes shake {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-3px); }
}
.result-stars {
text-align: center; font-size: 18px; margin-bottom: 12px; color: #ffa500;
}
.result-info {
font-size: 14px; color: #555; margin-bottom: 6px;
display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
}
.result-info .icon { font-size: 16px; flex-shrink: 0; }
.result-info .text { flex: 1; word-break: break-word; }
.result-info a { color: #ff6b35; text-decoration: none; font-weight: 600; }

.pick-btn {
width: 100%; padding: 16px; border: none;
background: linear-gradient(135deg, #ff6b35, #ff8c42);
color: white; font-size: 17px; font-weight: 700;
border-radius: 16px; cursor: pointer; letter-spacing: 2px;
box-shadow: 0 6px 20px rgba(255,107,53,0.4);
transition: transform 0.1s; font-family: inherit;
margin-bottom: 16px;
}
.pick-btn:active { transform: scale(0.97); }
.pick-btn:disabled { opacity: 0.5; }

.list-header {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 12px;
}
.data-tools {
display: flex; gap: 6px; margin-bottom: 12px;
}
.tool-btn {
flex: 1; padding: 8px 4px; border: 1.5px solid #eee; background: white;
border-radius: 10px; font-size: 13px; color: #666; cursor: pointer;
font-family: inherit; font-weight: 600;
}
.tool-btn:active { transform: scale(0.96); }
.tool-btn-danger { color: #ff4757; border-color: #ffd0d5; }
.add-store-btn {
padding: 10px 16px; border: none; background: #ff6b35; color: white;
border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer;
box-shadow: 0 4px 12px rgba(255,107,53,0.3); font-family: inherit;
}
.store-count { font-size: 14px; color: #888; }
.store-item {
background: white; border-radius: 14px; padding: 14px; margin-bottom: 10px;

}
.store-item-top {

}
.store-name { font-size: 17px; font-weight: 700; }
.store-stars { color: #ffa500; font-size: 14px; }
.store-meta {

}
.store-tag {

}
.empty-list {

.modal-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,0.5);
z-index: 100; display: none; align-items: flex-end;
}
.modal-overlay.show { display: flex; }
.modal {
background: white; width: 100%; max-height: 90vh;
border-radius: 24px 24px 0 0;
padding: 20px 20px calc(env(safe-area-inset-bottom) + 20px) 20px;
overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.modal-title {

}
.form-group { margin-bottom: 14px; }
.form-label {

color: #666; margin-bottom: 6px;

.import-box {

border-radius: 12px; padding: 12px; margin-bottom: 16px;

.import-row { display: flex; gap: 6px; align-items: center; }
.import-row .form-input { flex: 1; }
.input-wrap {
position: relative; flex: 1; display: flex; align-items: center;
}
.input-wrap .form-input {

}
.clear-btn {
position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
width: 22px; height: 22px; border-radius: 50%;
border: none; background: #ccc; color: white;
font-size: 14px; line-height: 1; font-weight: 700;
cursor: pointer; display: none;
align-items: center; justify-content: center;
padding: 0; font-family: inherit;
}
.clear-btn.show { display: flex; }
.clear-btn:active { background: #999; }
.import-hint {

.import-hint.success { color: #10b981; }
.import-hint.error { color: #ff4757; }
.import-hint a { color: #ff6b35; text-decoration: underline; font-weight: 600; }
.add-btn-sec {

}
.form-input, .form-textarea {
width: 100%; padding: 10px 12px; border: 1.5px solid #eee;
border-radius: 10px; font-size: 15px; outline: none; font-family: inherit;
}
.form-input:focus, .form-textarea:focus { border-color: #ff6b35; }
.form-textarea { resize: vertical; min-height: 60px; }
.star-picker {
display: flex; gap: 4px; font-size: 32px; color: #ddd; cursor: pointer;
}
.star-picker span.filled { color: #ffa500; }
.modal-actions {
display: flex; gap: 10px; margin-top: 20px;
}
.btn {
flex: 1; padding: 14px; border: none; border-radius: 12px;
font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.btn-primary { background: #ff6b35; color: white; }
.btn-secondary { background: #f0f0f0; color: #666; }
.btn-danger { background: #ff4757; color: white; }

@media (prefers-color-scheme: dark) {
html, body { background: linear-gradient(160deg, #1a1410 0%, #2d1f15 100%); color: #eee; }

.chip, .tool-btn { background: #1a1410; border-color: #3a3028; color: #bbb; }
.tool-btn-danger { color: #ff6b7a; border-color: #5a2028; }
.import-box { background: #1f1811; border-color: #5a3a28; }
.add-btn-sec { background: #3a2a1f !important; color: #ffb995 !important; border-color: #5a3a28 !important; }
.form-input, .form-textarea { background: #1a1410; border-color: #3a3028; color: #eee; }
.btn-secondary { background: #3a3028; color: #ccc; }
.store-tag { background: #3a2a1f; }
.result-info { color: #bbb; }
.clear-btn { background: #555; }
.clear-btn:active { background: #777; }
}
</style>

<script>
  const CATEGORIES = ['дёӯејҸ','ж—ҘејҸ','йҹ“ејҸ','иҘҝејҸ','зҫҺејҸ','йҖҹйЈҹ','ж—©йӨҗеә—','йәөйЈҹ','е°Ҹеҗғ','зҒ«йҚӢ','зҮ’зғӨ','йЈІж–ҷз”ңй»һ','е…¶д»–'];
  const MEAL_LABELS = { breakfast:'ж—©йӨҗ', lunch:'еҚҲйӨҗ', teatime:'дёӢеҚҲиҢ¶', dinner:'жҷҡйӨҗ', latenight:'е®өеӨң' };

  let stores = loadStores();
  let filter = { meal: 'all', category: 'all' };
  let editingId = null;
  let formState = { meals: [], category: '', stars: 0 };

  function loadStores() {
    try { return JSON.parse(localStorage.getItem('wte_stores') || '[]'); }
    catch(e) { return []; }
  }
  function saveStores() {
    localStorage.setItem('wte_stores', JSON.stringify(stores));
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function esc(s) { return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function renderStars(n) { return 'вҳ…'.repeat(n) + 'вҳҶ'.repeat(5-n); }

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.page).classList.add('active');
      if (btn.dataset.page === 'listPage') renderStoreList();
    });
  });

  function renderCategoryChips() {
    const container = document.getElementById('categoryChips');
    container.innerHTML = '<button class="chip active" data-cat="all">е…ЁйғЁ</button>' +
      CATEGORIES.map(c => `<button class="chip" data-cat="${c}">${c}</button>`).join('');
    container.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        filter.category = chip.dataset.cat;
      });
    });
  }
  renderCategoryChips();

  document.getElementById('mealChips').querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('mealChips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      filter.meal = chip.dataset.meal;
    });
  });

  document.getElementById('pickBtn').addEventListener('click', () => {
    const pool = stores.filter(s => {
      if (filter.meal !== 'all' && !(s.meals || []).includes(filter.meal)) return false;
      if (filter.category !== 'all' && s.category !== filter.category) return false;
      return true;
    });
    if (pool.length === 0) {
      showResultEmpty('жІ’жңүз¬ҰеҗҲжўқд»¶зҡ„еә—е®¶ рҹҳў\nеҺ»гҖҢжҲ‘зҡ„еҗҚе–®гҖҚж–°еўһзңӢзңӢ');
      return;
    }
    const btn = document.getElementById('pickBtn');
    btn.disabled = true;
    document.getElementById('resultEmpty').style.display = 'none';
    document.getElementById('resultContent').style.display = 'block';
    let count = 0;
    const total = pool.length > 1 ? 16 : 1;
    const interval = setInterval(() => {
      const pick = pool[Math.floor(Math.random()*pool.length)];
      renderResult(pick, count < total-1);
      count++;
      if (count >= total) {
        clearInterval(interval);
        btn.disabled = false;
        if (navigator.vibrate) navigator.vibrate(30);
      }
    }, 70);
  });

  function showResultEmpty(msg) {
    const e = document.getElementById('resultEmpty');
    e.style.display = 'block';
    e.textContent = msg;
    document.getElementById('resultContent').style.display = 'none';
  }

  function renderResult(s, rolling) {
    let mapUrl = '';
    if (s.lat && s.lng) {
      mapUrl = `https://maps.apple.com/?ll=${s.lat},${s.lng}&q=${encodeURIComponent(s.name)}`;
    } else if (s.address) {
      mapUrl = `https://maps.apple.com/?q=${encodeURIComponent(s.address)}`;
    }
    const mealText = (s.meals||[]).map(m=>MEAL_LABELS[m]).join('гҖҒ') || 'вҖ”';
    document.getElementById('resultContent').innerHTML = `
      <div class="result-name ${rolling?'rolling':''}">${esc(s.name)}</div>
      <div class="result-stars">${renderStars(s.stars||0)}</div>
      <div class="result-info"><span class="icon">рҹҚҪпёҸ</span><span class="text">${esc(s.category||'жңӘеҲҶйЎһ')} В· ${mealText}</span></div>
      ${mapUrl && s.address ? `<div class="result-info"><span class="icon">рҹ“Қ</span><span class="text"><a href="${mapUrl}" target="_blank">${esc(s.address)}</a></span></div>` : (mapUrl ? `<div class="result-info"><span class="icon">рҹ“Қ</span><span class="text"><a href="${mapUrl}" target="_blank">й–Ӣе•ҹең°ең–</a></span></div>` : '')}
      ${s.hours ? `<div class="result-info"><span class="icon">рҹ•җ</span><span class="text">${esc(s.hours)}</span></div>` : ''}
      ${s.note ? `<div class="result-info"><span class="icon">рҹ“қ</span><span class="text">${esc(s.note)}</span></div>` : ''}
    `;
  }

  function renderStoreList() {
    const list = document.getElementById('storeList');
    document.getElementById('storeCount').textContent = `е…ұ ${stores.length} е®¶`;
    if (stores.length === 0) {
      list.innerHTML = '<div class="empty-list">йӮ„жІ’жңүд»»дҪ•еә—е®¶<br>й»һеҸідёҠгҖҢпјӢ ж–°еўһеә—е®¶гҖҚй–Ӣе§Ӣе»әз«ӢдҪ зҡ„еҸЈиўӢеҗҚе–®</div>';
      return;
    }
    list.innerHTML = stores.map(s => {
      const meals = (s.meals||[]).map(m=>MEAL_LABELS[m]).join('гҖҒ') || 'вҖ”';
      const addrShort = s.address ? (s.address.length>18 ? s.address.slice(0,18)+'вҖҰ' : s.address) : '';
      return `<div class="store-item" data-id="${s.id}">
        <div class="store-item-top">

  // еҢҜеҮәпјҡе„Әе…Ҳз”ЁеӮізөұдёӢијүпјҢеӨұж•—еүҮж”№з”Ё Web Share APIпјҲж”ҜжҸҙ PWA жЁЎејҸпјү
  document.getElementById('exportBtn').addEventListener('click', async () => {
    if (stores.length === 0) {
      alert('зӣ®еүҚжІ’жңүиіҮж–ҷеҸҜд»ҘеҢҜеҮә');
      return;
    }
    const payload = {
      app: 'what-to-eat',
      version: 1,
      exportedAt: new Date().toISOString(),
      stores: stores
    };
    const jsonStr = JSON.stringify(payload, null, 2);
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    const fname = `what-to-eat_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;

    // еҒөжё¬жҳҜеҗҰзӮә iOS PWA жЁЎејҸ
    const isStandalone = window.navigator.standalone === true ||
                         window.matchMedia('(display-mode: standalone)').matches;

    // PWA жЁЎејҸе„Әе…Ҳз”Ё Web Share API
    if (isStandalone && navigator.canShare) {
      try {
        const file = new File([jsonStr], fname, { type: 'application/json' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'еҗғд»ҖйәјеӮҷд»Ҫ' });
          return;
        }
      } catch (err) {
        if (err.name === 'AbortError') return; // дҪҝз”ЁиҖ…еҸ–ж¶Ҳ
      }
    }

    // жЁҷжә–дёӢијү
    try {
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (err) {
      // жңҖеҫҢеӮҷжҸҙпјҡй–Ӣж–°еҲҶй ҒйЎҜзӨә JSONпјҢи®“дҪҝз”ЁиҖ…жүӢеӢ•иӨҮиЈҪ
      const w = window.open();
      if (w) {
        w.document.title = fname;
        w.document.body.innerText = jsonStr;
      } else {
        alert('дёӢијүеӨұж•—пјҢи«ӢиӨҮиЈҪд»ҘдёӢе…§е®№жүӢеӢ•е„Іеӯҳпјҡ\n\n' + jsonStr.slice(0, 500) + '...');
      }
    }
  });

  // еҢҜе…Ҙпјҡи®ҖеҸ– JSON жӘ”

  document.getElementById('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];

    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const incoming = Array.isArray(data) ? data : data.stores;
        if (!Array.isArray(incoming)) throw new Error('ж јејҸйҢҜиӘӨ');
        const valid = incoming.filter(s => s && typeof s.name === 'string' && s.name.trim());
        if (valid.length === 0) {
          alert('жӘ”жЎҲиЈЎжІ’жңүжңүж•Ҳзҡ„еә—е®¶иіҮж–ҷ');
          return;
        }
        let mode;
        if (stores.length === 0) {
          mode = 'replace';
        } else {
          const choice = prompt(`зӣ®еүҚе·Іжңү ${stores.length} е®¶пјҢеҢҜе…ҘжӘ”жңү ${valid.length} е®¶гҖӮ\n\nијёе…Ҙ 1 = еҗҲдҪөпјҲдҝқз•ҷзҸҫжңү + еҠ е…Ҙж–°зҡ„пјү\nијёе…Ҙ 2 = иҰҶи“ӢпјҲжё…з©әзҸҫжңүж”№з”ЁеҢҜе…Ҙзҡ„пјү\nе…¶д»– = еҸ–ж¶Ҳ`, '1');
          if (choice === '1') mode = 'merge';
          else if (choice === '2') mode = 'replace';
          else return;
        }
        if (mode === 'replace') {
          stores = valid.map(s => ({ ...s, id: s.id || uid() }));
        } else {
          const existingNames = new Set(stores.map(s => s.name));

          stores = stores.concat(toAdd);
          alert(`еҗҲдҪөе®ҢжҲҗпјҡж–°еўһ ${toAdd.length} е®¶пјҢз•ҘйҒҺ ${valid.length - toAdd.length} е®¶йҮҚиӨҮгҖӮ`);
        }
        saveStores();
        renderStoreList();

        alert('еҢҜе…ҘеӨұж•—пјҡжӘ”жЎҲж јејҸдёҚжӯЈзўә');

      }
    };

  });

  // ===== Google Maps йҖЈзөҗи§Јжһҗ =====
  function setImportHint(text, type) {
    const el = document.getElementById('importHint');
    el.textContent = text;
    el.className = 'import-hint' + (type ? ' ' + type : '');
  }

  // и§ЈжһҗгҖҢйғөйҒһеҚҖиҷҹ+ең°еқҖ+еә—еҗҚгҖҚйҖҷзЁ®е–®иЎҢзҙ”ж–Үеӯ—
  // дҫӢеӯҗпјҡ104иҮәеҢ—еёӮдёӯеұұеҚҖеҚ—дә¬иҘҝи·Ҝ12иҷҹйјҺжі°иұҗ еҚ—иҘҝеә—B2
  //      10491 еҸ°еҢ—еёӮдёӯеұұеҚҖеҚ—дә¬иҘҝи·Ҝ 12 иҷҹ 2 жЁ“ жҹҗжҹҗйӨҗе»і
  function parsePlainTextAddress(raw) {
    let s = raw.trim().replace(/\s+/g, ' ');
    if (!s) return null;

    // жӢ”й–Ӣй ӯйғөйҒһеҚҖиҷҹпјҲ3-6 зўјж•ёеӯ—пјҢеҸҜиғҪеӨҫз©әзҷҪжҲ– "-"пјү
    s = s.replace(/^(\d{3,6})[\s\-]*/, '');

    // жүҫең°еқҖиө·е§Ӣпјҡеҝ…й ҲжҳҜгҖҢXзёЈ/XеёӮгҖҚжҲ–гҖҢXзёЈYеёӮгҖҚ
    const cityMatch = s.match(/([\u4e00-\u9fa5]{1,3}[зёЈеёӮ])/);
    if (!cityMatch) return null;
    const cityStart = s.indexOf(cityMatch[0]);
    // дёҹжҺүзёЈеёӮеҗҚеүҚйқўзҡ„йӣңиЁҠ
    s = s.slice(cityStart);

    // ең°еқҖзөҗе°ҫзү№еҫөпјҡеңЁгҖҢиҷҹгҖҚгҖҢжЁ“гҖҚгҖҢе®ӨгҖҚгҖҢFгҖҚгҖҢBж•ёеӯ—гҖҚйҖҷйЎһй—ңйҚөеӯ—д№ӢеҫҢ
    // жҠ“еҮәгҖҢең°еқҖгҖҚеҚҖж®өпјҡеҫһй–Ӣй ӯеҲ°жңҖеҫҢдёҖеҖӢең°еқҖй—ңйҚөеӯ—зөҗжқҹ
    // жӯЈеүҮе„Әе…ҲеҢ№й…Қ ...иҷҹXжЁ“ / ...иҷҹ д№ӢX / ...иҷҹ XF / ...иҷҹ BX / ...иҷҹд№ӢX
    const addrPattern = /^(.+?[и·ҜиЎ—йҒ“е··еј„ж®ө]\s?\d+[\-д№Ӣ\d]*иҷҹ(?:\s?[\d\-д№Ӣ]+(?:жЁ“|F|f)?)?(?:\s?д№Ӣ\d+)?(?:\s?[Bb]\d+)?(?:\s?\d+\s?жЁ“)?)/;
    let addrMatch = s.match(addrPattern);

    // иӢҘжІ’еҢ№й…ҚеҲ°пјҲдҫӢеҰӮең°еқҖжІ’жңүи·ҜеҗҚеҸӘжңүгҖҢXXеҚҖXXиҷҹгҖҚпјүпјҢи©ҰеҜ¬й¬ҶзүҲ
    if (!addrMatch) {
      addrMatch = s.match(/^(.+?\d+\s?иҷҹ(?:\s?[Bb]?\d+\s?[жЁ“F]?)?(?:\s?д№Ӣ\d+)?)/);
    }
    if (!addrMatch) return null;

    let address = addrMatch[1].trim();
    let rest = s.slice(addrMatch[0].length).trim();

    // еә—еҗҚеҸҜиғҪйӮ„её¶еҲҶеә—гҖҢXX еҚ—иҘҝеә—B2гҖҚвҶ’ йҖҷеҖӢгҖҢB2гҖҚжҳҜеә—е…§дҪҚзҪ®пјҢдҝқз•ҷзөҰеӮҷиЁ»
    // йҖҷиЈЎе–®зҙ”жҠҠеү©дёӢзҡ„з•¶еә—еҗҚ
    let name = rest;

    // жё…зҗҶең°еқҖдёӯеӨҡйӨҳз©әзҷҪ
    address = address.replace(/\s+/g, '');

    if (!name) return null;
    return { name, address };
  }

  // и§Јжһҗ Google Maps йҖЈзөҗпјҢжҠ“еҮәеә—еҗҚе’Ңең°еқҖ
  function parseGoogleMapsUrl(raw) {
    const url = raw.trim();
    if (!url) return null;

    // зҹӯйҖЈзөҗеҲӨж–·
    if (/maps\.app\.goo\.gl|goo\.gl\/maps/.test(url)) {
      return { shortLink: true };
    }

    try {
      const u = new URL(url);
      if (!/google\.[^/]+/.test(u.hostname) && !u.hostname.includes('maps')) {
        return null;
      }

      const result = { name: '', address: '', lat: null, lng: null };

      // ж јејҸ 1: /maps/place/еә—еҗҚ/@lat,lng,zoom/data=...
      const placeMatch = u.pathname.match(/\/maps\/place\/([^\/]+)/);
      if (placeMatch) {
        const fullPlace = decodeURIComponent(placeMatch[1]).replace(/\+/g, ' ').trim();
        // жңүдәӣйҖЈзөҗзҡ„ place ж®өз”Ё "," еҲҶйҡ”еә—еҗҚе’Ңең°еқҖ
        if (/[,пјҢ]/.test(fullPlace)) {
          const parts = fullPlace.split(/[,пјҢ]/).map(s => s.trim()).filter(Boolean);
          result.name = parts[0];
          if (parts.length > 1) {
            const addrCandidate = parts.slice(1).join(', ');
            if (/\d/.test(addrCandidate) || /[и·ҜиЎ—йҒ“е··еј„иҷҹ]/.test(addrCandidate)) {
              result.address = addrCandidate;
            }
          }
        } else {
          // жІ’жңүйҖ—иҷҹеҲҶйҡ” вҶ’ еҸҜиғҪж•ҙдёІжҳҜгҖҢйғөйҒһеҚҖиҷҹ+ең°еқҖ+еә—еҗҚгҖҚж··еңЁдёҖиө·
          // е…Ҳи©Ұз”Ёзҙ”ж–Үеӯ—и§ЈжһҗеҷЁжӢҶеҲҶ
          const textParsed = parsePlainTextAddress(fullPlace);
          if (textParsed && textParsed.name && textParsed.address) {
            result.name = textParsed.name;
            result.address = textParsed.address;
          } else {
            // зҙ”ж–Үеӯ—и§Јжһҗд№ҹеӨұж•—пјҢж•ҙдёІз•¶еә—еҗҚ
            result.name = fullPlace;
          }
        }
      }

      // ж јејҸ 2: /maps/search/еә—еҗҚ?...
      if (!result.name) {
        const searchMatch = u.pathname.match(/\/maps\/search\/([^\/\?]+)/);
        if (searchMatch) {
          result.name = decodeURIComponent(searchMatch[1]).replace(/\+/g, ' ').trim();
        }
      }

      // ж јејҸ 3: q еҸғж•ё
      if (!result.name) {
        const q = u.searchParams.get('q');
        if (q) result.name = q.trim();
      }

      // жҠ“еә§жЁҷ @lat,lng,zoomпјҲйҖҷеҖӢжҳҜгҖҢзӣ®еүҚиҰ–и§’гҖҚпјҢиЎ—жҷҜжҷӮеҸҜиғҪдёҚжҳҜеә—е®¶дҪҚзҪ®пјү
      const coordMatch = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (coordMatch) {
        result.lat = parseFloat(coordMatch[1]);
        result.lng = parseFloat(coordMatch[2]);
      }

      // жӣҙзІҫзўәзҡ„еә§жЁҷеңЁ data еҸғж•ёе…§ !3dLAT!4dLNGпјҲйҖҷжҳҜеә—е®¶зңҹеҜҰдҪҚзҪ®пјҢе„Әе…Ҳз”Ёпјү
      const preciseMatch = url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
      if (preciseMatch) {
        result.lat = parseFloat(preciseMatch[1]);
        result.lng = parseFloat(preciseMatch[2]);
      }

      // иӢҘең°еқҖжҠ“дёҚеҲ°дҪҶжңүеә§жЁҷпјҢз”Ёеә§жЁҷз•¶еӮҷжҸҙең°еқҖпјҲApple Maps еҸҜд»ҘзӣҙжҺҘз”Ёеә§жЁҷе°ҺиҲӘпјү
      if (!result.address && result.lat && result.lng) {
        result.address = `${result.lat},${result.lng}`;
        result.addressIsCoord = true;
      }

      if (!result.name) return null;
      return result;
    } catch (e) {
      return null;
    }
  }

  // зөұдёҖе…ҘеҸЈпјҡеҲӨж–·жҳҜ URL йӮ„жҳҜзҙ”ж–Үеӯ—пјҢеҲҶеҲҘе‘јеҸ«е°ҚжҮүи§ЈжһҗеҷЁ
  function parseInput(raw) {
    const s = raw.trim();
    if (!s) return null;
    // зңӢиө·дҫҶеғҸ URL
    if (/^https?:\/\//i.test(s) || /google\.|maps\.app\.goo\.gl|goo\.gl\/maps/.test(s)) {
      return parseGoogleMapsUrl(s);
    }
    // еҗҰеүҮз•¶зҙ”ж–Үеӯ—
    return parsePlainTextAddress(s);
  }

  document.getElementById('importParseBtn').addEventListener('click', () => {
    const raw = document.getElementById('fImportUrl').value;
    if (!raw.trim()) {
      setImportHint('и«Ӣе…ҲиІјдёҠйҖЈзөҗжҲ–ең°еқҖ', 'error');
      return;
    }
    const parsed = parseInput(raw);

    if (!parsed) {
      setImportHint('з„Ўжі•иҫЁиӯҳпјҢи«ӢиІј Google Maps йҖЈзөҗгҖҒжҲ–гҖҢйғөйҒһеҚҖиҷҹ+ең°еқҖ+еә—еҗҚгҖҚж јејҸ', 'error');
      return;
    }

    if (parsed.shortLink) {
      const rawUrl = raw.trim();
      const safe = rawUrl.replace(/"/g, '&quot;');
      document.getElementById('importHint').className = 'import-hint error';
      document.getElementById('importHint').innerHTML =
        `еҒөжё¬еҲ° Google Maps зҹӯйҖЈзөҗпјҢз„Ўжі•зӣҙжҺҘи§ЈжһҗгҖӮ<br>` +
        `в‘  <a href="${safe}" target="_blank" rel="noopener">й»һйҖҷиЈЎеңЁж–°еҲҶй Ғжү“й–Ӣ</a><br>` +
        `в‘Ў зӯү Google Maps ијүе…Ҙе®ҢжҲҗеҫҢпјҢеҫһз¶ІеқҖеҲ—иӨҮиЈҪе®Ңж•ҙзҡ„й•·йҖЈзөҗ<br>` +
        `в‘ў еӣһдҫҶиІјеҲ°жӯӨж¬„дҪҚпјҢеҶҚжҢүи§Јжһҗ<br>` +
        `пјҲжҲ–зӣҙжҺҘеңЁ Google Maps й»һгҖҢиӨҮиЈҪең°еқҖгҖҚпјҢиІјеӣһдҫҶд№ҹиЎҢпјү`;
      return;
    }

    document.getElementById('fName').value = parsed.name || '';
    if (parsed.address) {
      document.getElementById('fAddr').value = parsed.address;
    }

    // е„Іеӯҳеә§жЁҷеҲ°иҮЁжҷӮзӢҖж…Ӣ(жңӘдҫҶеҸҜз”Ё)
    formState.lat = parsed.lat;
    formState.lng = parsed.lng;

    const filled = [];
    if (parsed.name) filled.push('еә—еҗҚ');
    if (parsed.address && !parsed.addressIsCoord) filled.push('ең°еқҖ');
    if (parsed.addressIsCoord) filled.push('ең°еқҖ(еә§жЁҷ)');
    else if (parsed.lat) filled.push('еә§жЁҷ');
    let msg = `вң“ е·ІиҮӘеӢ•еЎ«е…Ҙпјҡ${filled.join('гҖҒ')}`;
    if (parsed.addressIsCoord) {
      msg += '\nвҖ» жӯӨйҖЈзөҗжІ’жңүж–Үеӯ—ең°еқҖпјҢз”Ёеә§жЁҷд»ЈжӣҝпјҲе°ҺиҲӘд»ҚеҸҜз”ЁпјүгҖӮиӢҘиҰҒйЎҜзӨәй–ҖзүҢең°еқҖпјҢеҸҜжүӢеӢ•жӣҝжҸӣгҖӮ';
    }
    setImportHint(msg, 'success');
  });

  // иІјдёҠжҷӮиҮӘеӢ•и§Јжһҗ
  document.getElementById('fImportUrl').addEventListener('paste', (e) => {
    setTimeout(() => {
      const v = e.target.value.trim();
      updateClearBtn();
      if (!v) return;
      // URL жҲ–з–‘дјјеҸ°зҒЈең°еқҖпјҲеҢ…еҗ«зёЈеёӮпјүйғҪиҮӘеӢ•и§ёзҷј
      if (/google\.|maps\.app\.goo\.gl|goo\.gl\/maps/.test(v) ||
          /[\u4e00-\u9fa5]{1,3}[зёЈеёӮ]/.test(v)) {
        document.getElementById('importParseBtn').click();
      }
    }, 50);
  });

  // ијёе…ҘжҷӮеҗҢжӯҘйЎҜзӨә/йҡұи—Ҹжё…йҷӨжҢүйҲ•
  function updateClearBtn() {
    const input = document.getElementById('fImportUrl');
    const btn = document.getElementById('importClearBtn');
    btn.classList.toggle('show', input.value.length > 0);
  }
  document.getElementById('fImportUrl').addEventListener('input', updateClearBtn);

  // жё…йҷӨжҢүйҲ•пјҡдёҖйҚөжё…з©әеҢҜе…Ҙж¬„ + йҮҚзҪ®жҸҗзӨә
  document.getElementById('importClearBtn').addEventListener('click', () => {
    const input = document.getElementById('fImportUrl');
    input.value = '';
    updateClearBtn();
    setImportHint('ж”ҜжҸҙ Google Maps йҖЈзөҗгҖҒжҲ–гҖҢйғөйҒһеҚҖиҷҹ+ең°еқҖ+еә—еҗҚгҖҚдёҖж•ҙиЎҢж–Үеӯ—', '');
    input.focus();
  });

  // рҹ”Қ з”Ё Google Maps жҗңе°ӢжӯӨеә—
  document.getElementById('searchGoogleBtn').addEventListener('click', () => {
    const name = document.getElementById('fName').value.trim();
    if (!name) {
      alert('и«Ӣе…Ҳијёе…Ҙеә—еҗҚ');
      document.getElementById('fName').focus();
      return;
    }
    const url = `https://www.google.com/maps/search/${encodeURIComponent(name)}`;
    window.open(url, '_blank');
  });

  renderStoreList();
</script>

</body>
</html>
